<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rubio Consulting</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@200;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #c9a84c;
      --dark: #0a0a0a;
      --cream: #f5f0e8;
    }

    body {
      background-color: var(--dark);
      color: var(--cream);
      font-family: 'Montserrat', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Subtle grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* Radial glow behind text */
    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(201,168,76,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      animation: fadeUp 1.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .eyebrow {
      font-family: 'Montserrat', sans-serif;
      font-weight: 200;
      font-size: clamp(0.55rem, 1.5vw, 0.7rem);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 1.2s 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--gold);
      margin: 0 auto 2rem;
      opacity: 0;
      animation: expandWidth 1s 0.5s ease forwards;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.2rem, 7vw, 5rem);
      line-height: 1.1;
      letter-spacing: 0.02em;
      color: var(--cream);
      opacity: 0;
      animation: fadeUp 1.4s 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    h1 span {
      color: var(--gold);
      font-style: italic;
    }

    .tagline {
      margin-top: 2rem;
      font-size: clamp(0.6rem, 1.8vw, 0.75rem);
      font-weight: 200;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: rgba(245, 240, 232, 0.4);
      opacity: 0;
      animation: fadeUp 1.2s 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .divider-bottom {
      width: 20px;
      height: 1px;
      background: var(--gold);
      margin: 2rem auto 0;
      opacity: 0;
      animation: expandWidth 1s 1.2s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes expandWidth {
      from { opacity: 0; width: 0; }
      to   { opacity: 0.6; width: 40px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="eyebrow">Est. Nigeria</p>
    <div class="divider"></div>
    <h1>Welcome to<br>Rubio <span>Consulting</span></h1>
    <p class="tagline">Your Home of Leverage&#8209;Fi</p>
    <div class="divider-bottom"></div>
  </div>
</body>
</html>
